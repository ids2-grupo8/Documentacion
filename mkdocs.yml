site_name: Bazaar — Grupo 8
site_description: Documentación del proyecto Bazaar - Marketplace
site_url: https://ids2-grupo8.github.io/Documentacion/site/

theme:
  name: material
  language: es
  palette:
    - scheme: slate
      primary: deep purple
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
    - scheme: default
      primary: deep purple
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
  font:
    text: Fira Sans
    code: Fira Code
  icon:
    logo: material/shopping
  features:
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Inicio: index.md
  - Sprints:
      - Sprint 1: sprints/sprint-1.md
      - Sprint 2: sprints/sprint-2.md
      - Sprint 3: sprints/sprint-3.md
      - Sprint 4: sprints/sprint-4.md
  - Arquitectura:
      - Resumen: arquitectura/index.md
      - Diagramas C4: arquitectura/diagramas-c4.md
  - Pruebas de carga:
      - Resumen: pruebas-de-carga/index.md
      - Optimizaciones aplicadas: pruebas-de-carga/optimizaciones.md
      - Cómo ejecutar: pruebas-de-carga/como-ejecutar.md
  - ADR:
      - Índice: adr/index.md
      - Plantilla: adr/plantilla.md
      - ADR-0001 — Una orden por vendedor: adr/adr-0001-una-orden-por-vendedor-en-checkout.md
      - ADR-0002 — Kong como API Gateway: adr/adr-0002-kong-como-api-gateway.md
      - ADR-0003 — Stack heterogéneo: adr/adr-0003-stack-heterogeneo-python-go-postgres-mongo.md
      - ADR-0004 — Consistencia distribuida (saga): adr/adr-0004-consistencia-distribuida-saga-compensacion.md
      - ADR-0005 — Resiliencia HTTP (Retry + CB): adr/adr-0005-resiliencia-http-retry-y-circuit-breaker.md
      - ADR-0006 — Despliegue en GKE/GCP: adr/adr-0006-despliegue-gke-en-gcp.md
      - ADR-0007 — Recomendaciones en Home: adr/adr-0007-recomendaciones-en-home.md
  - Servicios:
      - User Service: servicios/user-service.md
      - Product Service: servicios/product-service.md
      - Checkout Service: servicios/checkout-service.md
      - Backoffice: servicios/backoffice.md
      - Mobile App: servicios/mobile-app.md

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - kroki:
      server_url: !ENV [KROKI_SERVER_URL, 'http://localhost:8001']
      tag_format: svg

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - attr_list
  - toc:
      permalink: true
