site_name: Bazaar — Grupo 8
site_description: Documentación del proyecto Bazaar - Marketplace
site_url: https://ids2-grupo8.github.io/Documentacion/site/

theme:
  name: material
  language: es
  palette:
    - scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
    - scheme: default
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
  font:
    text: Fira Sans
    code: Fira Code
  icon:
    logo: material/shopping
  features:
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Inicio: index.md
  - Sprints:
      - Sprint 1: sprints/sprint-1.md
  - Arquitectura: arquitectura/index.md
  - Servicios:
      - User Service: servicios/user-service.md
      - Product Service: servicios/product-service.md
      - Backoffice: servicios/backoffice.md
      - Mobile App: servicios/mobile-app.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - attr_list
  - toc:
      permalink: true
